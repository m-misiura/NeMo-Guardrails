pull_request_rules:
  - name: Backport merged PRs from develop → incubation
    conditions:
      - base=develop
      - merged
      - author!=mergify[bot]
      - repository-full-name=opendatahub-io/NeMo-Guardrails
    actions:
      backport:
        branches:
          - incubation
        ignore_conflicts: true
        labels:
          - bot/sync-incubation
        title: "[incubation] {{ title }}"
        body: |
          Backport of #{{ number }} — {{ title }}

          This PR cherry-picks the changes from `develop` into `incubation`.

  - name: Backport merged PRs from incubation → stable (skip .tekton-only changes)
    conditions:
      - base=incubation
      - merged
      - repository-full-name=opendatahub-io/NeMo-Guardrails
      - files~=^(?!\.tekton/).+
    actions:
      backport:
        branches:
          - stable
        ignore_conflicts: true
        labels:
          - bot/sync-stable
        title: "[stable] {{ title | replace('[incubation] ', '') | replace('Backport to incubation: ', '') | replace('Backport to incubation:', '') }}"
        body: |
          Backport of #{{ number }} — {{ title }}

          This PR cherry-picks the changes from `incubation` into `stable`.
