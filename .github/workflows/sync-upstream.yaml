name: Sync upstream develop

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4

      - name: Set up Git user
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NVIDIA/NeMo-Guardrails.git
          git fetch upstream

      - name: Merge upstream/develop into develop
        run: |
          git checkout develop
          git merge --ff-only upstream/develop || exit 0

      - name: Push changes to your fork
        run: |
          git push origin develop